<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars - A Lenda de Cabo Fabal</title>


<style>
body{
    margin:0;
    font-family:Verdana,sans-serif;
    color:#FFE81F;
    background:url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=1600') center/cover fixed;
}
.overlay{
    min-height:100vh;
    background:rgba(0,0,0,.82);
}
header{
    text-align:center;
    padding:20px;
    border-bottom:2px solid #FFE81F;
}
@font-face{
    font-family:"StarJedi";
    src:url("Starjedi.ttf") format("truetype");
}
h1{
    margin:0;
    font-family:"StarJedi", sans-serif;
    font-size:48px;
    letter-spacing:5px;
}
h2{
    font-family:"StarJedi", sans-serif;
    color:#FFF6A0;
    font-weight:normal;
}
.panel{
    max-width:1100px;
    margin:auto;
    padding:20px;
}
.stats{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}
.card{
    background:#111;
    border:1px solid #FFE81F;
    padding:10px;
    border-radius:8px;
}
#story{
    background:#0b0b0b;
    border:1px solid #FFE81F;
    padding:20px;
    margin-top:20px;
    border-radius:8px;
    line-height:1.8;
    white-space:pre-line;
}
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1b1b1b;
    color:#FFE81F;
    border:1px solid #FFE81F;
    cursor:pointer;
    font-family:Verdana,sans-serif;
    font-weight:bold;
}
button:hover{
    background:#333;
}
.bar{
    height:20px;
    background:#222;
    margin-top:10px;
}
.fill{
    height:100%;
    background:#FFE81F;
    width:0%;
}
</style>

</head>
<body>

<div class="overlay">

<header>
<h1>STAR WARS</h1>
<h2>A Lenda de Cabo Fabal e Scott Maul</h2>
</header>

<div class="panel">

<div class="stats">
<div class="card">HP: <span id="hp">100</span></div>
<div class="card">Liderança: <span id="lead">0</span></div>
<div class="card">Influência Rebelde: <span id="inf">0</span></div>
<div class="card">Força: <span id="force">0</span></div>
<div class="card">Frota: <span id="fleet">0</span></div>
</div>

<div class="bar">
<div id="progress" class="fill"></div>
</div>

<div id="story"></div>
<div id="choices"></div>

</div>
</div>

<script src="scenes.js"></script>

<script>

let state;

const saveData = localStorage.getItem("SW_FABAL");

if(saveData){

    const continuar = confirm(
        "Foi encontrada uma jornada salva.\n\n" +
        "OK = Continuar jornada\n" +
        "Cancelar = Iniciar uma nova jornada"
    );

    if(continuar){

        state = JSON.parse(saveData);

    }else{

        localStorage.removeItem("SW_FABAL");

        state = {
            scene:"start",
            hp:100,
            lead:0,
            inf:0,
            force:0,
            fleet:0
        };
    }

}else{

    state = {
        scene:"start",
        hp:100,
        lead:0,
        inf:0,
        force:0,
        fleet:0
    };
}

function save(){
    localStorage.setItem(
        "SW_FABAL",
        JSON.stringify(state)
    );
}

function render(){

    const scene = scenes[state.scene];

    if(!scene){
        document.getElementById("story").innerHTML =
            "<h2>Erro: cena não encontrada (" +
            state.scene +
            ")</h2>";
        return;
    }

    document.getElementById("hp").innerText = state.hp;
    document.getElementById("lead").innerText = state.lead;
    document.getElementById("inf").innerText = state.inf;
    document.getElementById("force").innerText = state.force;
    document.getElementById("fleet").innerText = state.fleet;
    const progressMap = {
    start:0,
    yavin:8,
    tatooine:8,
    training:8,
    question:15,
    danger:15,
    trust:15,
    chapter2:25,
    chapter3:35,
    chapter4:45,
    chapter5:55,
    chapter6:65,
    chapter7:75,
    chapter8:82,
    chapter9:88,
    chapter10:93,
    chapter11:97,
    chapter12:100,
    hero:100,
    peace:100,
    love:100,
    lose:100
    };

    document.getElementById("progress").style.width =
        (progressMap[state.scene] || 0) + "%";


    document.getElementById("story").innerHTML =
        "<h3>" + scene.text + "</h3>";

    const choicesDiv =
        document.getElementById("choices");

    choicesDiv.innerHTML = "";

    if(scene.choices.length === 0){

        const btn =
            document.createElement("button");

        btn.textContent =
            "Reiniciar Aventura";

        btn.onclick = () => {

            localStorage.removeItem(
                "SW_FABAL"
            );

            location.reload();
        };

        choicesDiv.appendChild(btn);
        return;
    }

    scene.choices.forEach(choice => {

        const btn =
            document.createElement("button");

        btn.textContent = choice[0];

        btn.onclick = () => {

            state.hp += choice[2];
            state.lead += choice[3];
            state.inf += choice[4];
            state.force += choice[5];
            state.fleet += choice[6];

            state.scene = choice[1];

            save();

            render();
        };

        choicesDiv.appendChild(btn);
    });

}

render();

</script>

</body>
</html>
